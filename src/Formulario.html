<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrar Receta</title>

    <link rel="stylesheet" href="../css/Formulario.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        🍽️ SaborConecta
    </div>

    <nav>

        <a href="Inicio.html">Inicio</a>
        <a href="Perfil.html">Perfil</a>
        <a href="#">Colecciones</a>
        <a href="#">Comunidad</a>

    </nav>

    <a href="#">Cerrar sesión</a>

</header>

<main>

<section class="formulario">

<h1>Registrar Nueva Receta</h1>

<p>Comparte tu mejor receta con la comunidad.</p>

<form>

<div class="grupo">

<label for="nombre">Nombre de la receta</label>

<input
type="text"
id="nombre"
name="nombre"
placeholder="Ej. Pasta Alfredo"
required>

</div>

<div class="grupo">

<label for="categoria">Categoría</label>

<select id="categoria" name="categoria">

<option>Italiana</option>
<option>Asiática</option>
<option>Mexicana</option>
<option>Postres</option>
<option>Vegetariana</option>

</select>

</div>

<div class="grupo">

<label for="tiempo">Tiempo de preparación (minutos)</label>

<input
type="number"
id="tiempo"
name="tiempo"
placeholder="30">

</div>

<div class="grupo">

<label for="dificultad">Dificultad</label>

<select id="dificultad" name="dificultad">

<option>Fácil</option>
<option>Media</option>
<option>Difícil</option>

</select>

</div>

<div class="grupo">

<label for="ingredientes">Ingredientes</label>

<textarea
id="ingredientes"
name="ingredientes"
rows="5"
placeholder="Escribe los ingredientes..."></textarea>

</div>

<div class="grupo">

<label for="preparacion">Preparación</label>

<textarea
id="preparacion"
name="preparacion"
rows="8"
placeholder="Describe paso a paso la preparación..."></textarea>

</div>

<div class="grupo">

<label for="imagen">Imagen de la receta</label>

<input
type="file"
id="imagen"
name="imagen">

</div>

<button type="submit">
Publicar receta
</button>

</form>

</section>

</main>

<footer>

<p>© 2026 SaborConecta</p>

</footer>

</body>
</html>
